name: Cloud Build and Push

on:
  workflow_dispatch:
    inputs:
      acr_password:
        description: 'ACR Admin Password'
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Sample Data
        run: python scripts/generate_sample_data.py

      - name: Train Model
        run: python services/conversion/train.py

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: cipregistry13.azurecr.io
          username: cipregistry13
          password: ${{ github.event.inputs.acr_password }}

      - name: Build and Push Conversion Service Image
        run: |
          docker build -f docker/Dockerfile.conversion -t cipregistry13.azurecr.io/weel13-conversion:latest .
          docker push cipregistry13.azurecr.io/weel13-conversion:latest

      - name: Build and Push RAG Service Image
        run: |
          docker build -f docker/Dockerfile.rag -t cipregistry13.azurecr.io/weel13-rag:latest .
          docker push cipregistry13.azurecr.io/weel13-rag:latest
